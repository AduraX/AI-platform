apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: ConfigMap
      name: ai-platform-config
    patch: |-
      - op: replace
        path: /data/ENVIRONMENT
        value: development
      - op: replace
        path: /data/LOG_LEVEL
        value: DEBUG
      - op: replace
        path: /data/AUTH_ENABLED
        value: "false"
      - op: replace
        path: /data/CORS_ALLOWED_ORIGINS
        value: '["http://localhost:3000"]'
