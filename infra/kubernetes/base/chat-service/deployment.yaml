apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: enterprise-ai
  labels:
    app: chat-service
    app.kubernetes.io/part-of: enterprise-ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
        app.kubernetes.io/part-of: enterprise-ai-platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: chat-service
          image: enterprise-ai/chat-service:latest
          ports:
            - containerPort: 8002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai-platform-config
            - secretRef:
                name: ai-platform-secrets
          env:
            - name: SERVICE_NAME
              value: "chat-service"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
