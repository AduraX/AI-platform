apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-platform-internal
  namespace: enterprise-ai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: enterprise-ai-platform
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within the namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: enterprise-ai
    # Allow traffic from istio-system (ingress gateway)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic within namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: enterprise-ai
    # Allow traffic to external services (Keycloak, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
